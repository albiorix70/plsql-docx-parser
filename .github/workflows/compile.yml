name: Compile PL/SQL

on:
  push:
    paths:
      - 'docx_parser.*'
      - 'run_compile.sql'
      - '.github/workflows/compile.yml'
  pull_request:
    paths:
      - 'docx_parser.*'
      - 'run_compile.sql'

jobs:
  compile:
    name: Compile docx_parser package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Install unzip and curl
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip curl

      - name: Download SQLcl
        env:
          SQLCL_ZIP_URL: ${{ secrets.SQLCL_ZIP_URL }}
        run: |
          if [ -z "${SQLCL_ZIP_URL}" ]; then
            echo "Missing secret SQLCL_ZIP_URL (set to a direct SQLcl .zip download URL)." >&2
            exit 1
          fi
          curl -fsSL -o /tmp/sqlcl.zip "${SQLCL_ZIP_URL}"
          mkdir -p /opt/sqlcl
          unzip -q /tmp/sqlcl.zip -d /opt/sqlcl
          # SQLcl archives typically contain a folder named sqlcl or sqlcl-<version>
          SQLCL_DIR=$(find /opt/sqlcl -maxdepth 1 -type d -name 'sqlcl*' | head -n1)
          if [ -z "${SQLCL_DIR}" ]; then
            echo "Unable to locate sqlcl directory inside archive" >&2
            ls -la /opt/sqlcl
            exit 1
          fi
          echo "SQLcl installed to ${SQLCL_DIR}"
          echo "SQLCL_DIR=${SQLCL_DIR}" >> $GITHUB_ENV

      - name: Run compile script
        env:
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_SERVICE: ${{ secrets.DB_SERVICE }}
          SQLCL_DIR: ${{ env.SQLCL_DIR }}
        run: |
          chmod +x ./ci/run_compile.sh
          ./ci/run_compile.sh

      - name: Upload compile output
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: compile-logs
          path: ./ci/compile_output.log
